<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixHub - Electrical Repairs Services Questions</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #333;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 700;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .modal-title {
            color: #0066cc;
            margin: 0;
            font-size: 24px;
        }

        .close-button {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .close-button:hover {
            color: #333;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        select, 
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .checkbox-group {
            margin-top: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .checkbox-item input {
            margin-right: 10px;
        }

        .submit-button {
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .submit-button:hover {
            background-color: #0055aa;
        }

        /* Service card styles */
        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .service-card {
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .service-img {
            height: 200px;
            overflow: hidden;
        }

        .service-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .service-info {
            padding: 20px;
        }

        .service-info h3 {
            margin-top: 0;
            color: #0066cc;
        }
    </style>
</head>
<body>
    <!-- Service card for Electrical Repairs -->
    <div class="service-grid">
        <div class="service-card" id="electrical-repair-service">
            <div class="service-img">
                <img src="e.jpeg" alt="Electrical Repairs Services">
            </div>
            <div class="service-info">
                <h3>Electrical Repairs Services</h3>
                <p>Get your electrical systems fixed with our expert electricians</p>
            </div>
        </div>
    </div>

    <!-- Modal for Electrical Repairs Services Questions -->
    <div class="modal-overlay" id="electrical-repair-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Electrical Repairs Services Questions</h2>
                <button class="close-button" id="close-electrical-repair-modal">&times;</button>
            </div>
            <form id="electrical-repair-form">
                <div class="form-group">
                    <label for="issue-type">What type of electrical issue are you experiencing?</label>
                    <select id="issue-type" name="issue-type" required>
                        <option value="" disabled selected>Select the issue type</option>
                        <option value="power-outage">Power Outage</option>
                        <option value="faulty-wiring">Faulty Wiring</option>
                        <option value="tripping-circuit">Tripping Circuit Breaker</option>
                        <option value="lights-flickering">Flickering Lights</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="urgency-level">How urgent is the issue?</label>
                    <select id="urgency-level" name="urgency-level" required>
                        <option value="" disabled selected>Select urgency level</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Would you like to schedule a recurring maintenance check?</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="recurring-maintenance" name="recurring-maintenance" value="yes">
                            <label for="recurring-maintenance">Yes, I would like recurring visits</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="preferred-date">Preferred Service Date:</label>
                    <input type="date" id="preferred-date" name="preferred-date" required>
                </div>

                <button type="submit" class="submit-button">Submit Request</button>
            </form>
        </div>
    </div>

    <script>
        // Get references to elements for Electrical Repairs Services
        const electricalRepairCard = document.getElementById('electrical-repair-service');
        const electricalRepairModal = document.getElementById('electrical-repair-modal');
        const closeElectricalRepairModal = document.getElementById('close-electrical-repair-modal');
        const electricalRepairForm = document.getElementById('electrical-repair-form');

        // Event listener for clicking on the electrical repair service card
        electricalRepairCard.addEventListener('click', function() {
            electricalRepairModal.style.display = 'flex';
        });

        // Event listener for closing the modal
        closeElectricalRepairModal.addEventListener('click', function() {
            electricalRepairModal.style.display = 'none';
        });

        // Close modal when clicking outside of it
        window.addEventListener('click', function(event) {
            if (event.target === electricalRepairModal) {
                electricalRepairModal.style.display = 'none';
            }
        });

        // Handle form submission
        electricalRepairForm.addEventListener('submit', function(event) {
            event.preventDefault();
            alert('Thank you for your request! Our electrical repair specialists will contact you soon.');
            electricalRepairModal.style.display = 'none';
        });
    </script>
</body>
</html>
