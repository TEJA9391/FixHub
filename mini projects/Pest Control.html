<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixHub - Pest Control Services Questions</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #333;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 700;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .modal-title {
            color: #0066cc;
            margin: 0;
            font-size: 24px;
        }

        .close-button {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .close-button:hover {
            color: #333;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        select, 
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .checkbox-group {
            margin-top: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .checkbox-item input {
            margin-right: 10px;
        }

        .submit-button {
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .submit-button:hover {
            background-color: #0055aa;
        }

        /* Service card styles */
        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .service-card {
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .service-img {
            height: 200px;
            overflow: hidden;
        }

        .service-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .service-info {
            padding: 20px;
        }

        .service-info h3 {
            margin-top: 0;
            color: #0066cc;
        }
    </style>
</head>
<body>
    <!-- Service card for Pest Control -->
    <div class="service-grid">
        <div class="service-card" id="pest-control-service">
            <div class="service-img">
                <img src="Pest.jpeg" alt="Pest Control Services">
            </div>
            <div class="service-info">
                <h3>Pest Control Services</h3>
                <p>Get rid of pests with our expert pest control team</p>
            </div>
        </div>
    </div>

    <!-- Modal for Pest Control Services Questions -->
    <div class="modal-overlay" id="pest-control-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Pest Control Services Questions</h2>
                <button class="close-button" id="close-pest-control-modal">&times;</button>
            </div>
            <form id="pest-control-form">
                <div class="form-group">
                    <label for="pest-type">What type of pests are you dealing with?</label>
                    <select id="pest-type" name="pest-type" required>
                        <option value="" disabled selected>Select pest type</option>
                        <option value="rodents">Rodents (Mice/Rats)</option>
                        <option value="insects">Insects (Ants, Cockroaches, etc.)</option>
                        <option value="termites">Termites</option>
                        <option value="bedbugs">Bed Bugs</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="infestation-level">How severe is the infestation?</label>
                    <select id="infestation-level" name="infestation-level" required>
                        <option value="" disabled selected>Select infestation level</option>
                        <option value="mild">Mild</option>
                        <option value="moderate">Moderate</option>
                        <option value="severe">Severe</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Would you like to schedule a recurring pest control service?</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="recurring-service" name="recurring-service" value="yes">
                            <label for="recurring-service">Yes, I would like recurring visits</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="preferred-date">Preferred Service Date:</label>
                    <input type="date" id="preferred-date" name="preferred-date" required>
                </div>

                <button type="submit" class="submit-button">Submit Request</button>
            </form>
        </div>
    </div>

    <script>
        // Get references to elements for Pest Control Services
        const pestControlCard = document.getElementById('pest-control-service');
        const pestControlModal = document.getElementById('pest-control-modal');
        const closePestControlModal = document.getElementById('close-pest-control-modal');
        const pestControlForm = document.getElementById('pest-control-form');

        // Event listener for clicking on the pest control service card
        pestControlCard.addEventListener('click', function() {
            pestControlModal.style.display = 'flex';
        });

        // Event listener for closing the modal
        closePestControlModal.addEventListener('click', function() {
            pestControlModal.style.display = 'none';
        });

        // Close modal when clicking outside of it
        window.addEventListener('click', function(event) {
            if (event.target === pestControlModal) {
                pestControlModal.style.display = 'none';
            }
        });

        // Handle form submission
        pestControlForm.addEventListener('submit', function(event) {
            event.preventDefault();
            alert('Thank you for your request! Our pest control specialists will contact you soon.');
            pestControlModal.style.display = 'none';
        });
    </script>
</body>
</html>
